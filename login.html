<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登入 | 舞光戰將點燈計劃</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+TC:wght@300;400;500;700;900&family=Noto+Serif+TC:wght@500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --glow-orange: #F58220;
    --glow-orange-bright: #FFA050;
    --bg-base: #08080A;
  }
  * { -webkit-font-smoothing: antialiased; }
  body {
    font-family: 'Noto Sans TC', 'Inter', system-ui, sans-serif;
    background: var(--bg-base);
    color: #F5F5F7;
    min-height: 100vh;
    overflow-x: hidden;
  }
  .font-display { font-family: 'Noto Serif TC', serif; font-weight: 900; letter-spacing: -0.02em; }
  .glow-orb {
    position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.4;
    pointer-events: none; z-index: 0;
  }
  .login-card {
    position: relative; z-index: 10;
    background: linear-gradient(180deg, rgba(26,26,31,0.8), rgba(19,19,22,0.9));
    border: 1px solid rgba(245,130,32,0.25); border-radius: 24px;
    padding: 48px 40px; max-width: 460px; width: 100%;
    box-shadow: 0 30px 80px -20px rgba(245,130,32,0.15);
    backdrop-filter: blur(20px);
  }
  .login-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(245,130,32,0.6), transparent);
  }
  .google-btn {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    width: 100%; padding: 14px 20px; border-radius: 12px;
    background: white; color: #1a1a1f;
    font-weight: 600; font-size: 15px;
    transition: all 0.2s ease; cursor: pointer;
    border: 1px solid transparent;
  }
  .google-btn:hover { transform: translateY(-1px); box-shadow: 0 10px 30px -10px rgba(255,255,255,0.2); }
  .google-btn:disabled { opacity: 0.6; cursor: not-allowed; }
</style>
</head>
<body>

<div class="glow-orb" style="background:#F58220; width:500px; height:500px; top:-100px; right:-100px;"></div>
<div class="glow-orb" style="background:#C66510; width:600px; height:600px; bottom:-200px; left:-150px;"></div>

<div class="min-h-screen flex flex-col items-center justify-center px-6 py-10">

  <!-- LOGO + Brand -->
  <div class="flex items-center gap-3 mb-10 relative z-10">
    <div class="relative w-12 h-12 flex items-center justify-center">
      <div class="absolute inset-0 bg-gradient-to-br from-orange-400 to-orange-600 blur-xl opacity-40 rounded-full"></div>
      <img id="brandLogo" class="relative w-12 h-12" style="filter: drop-shadow(0 0 8px rgba(245,130,32,0.5)); object-fit: contain;" alt="舞光" src="">
    </div>
    <div>
      <div class="font-display text-2xl">舞光戰將</div>
      <div class="text-[11px] text-gray-500 tracking-widest">DANCELIGHT TRAINING ACADEMY</div>
    </div>
  </div>

  <div class="login-card">
    <h1 class="font-display text-3xl mb-3">先登入，<span class="text-orange-300">再開始點燈</span></h1>
    <p class="text-sm text-gray-400 leading-relaxed mb-8">
      請使用主管授權給你的 Email 透過 Google 登入。<br>
      你的學習進度、徽章、答題紀錄會跨裝置同步保存。
    </p>

    <button id="signInBtn" class="google-btn">
      <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      <span>用 Google 登入</span>
    </button>

    <div id="loginError" class="hidden mt-5 p-4 rounded-lg bg-red-500/10 border border-red-500/30 text-sm text-red-300"></div>

    <div id="loginInfo" class="hidden mt-5 p-4 rounded-lg bg-orange-500/8 border border-orange-500/25 text-sm text-orange-200"></div>

    <!-- ===== GUEST MODE (DEMO ONLY — 正式上線前移除整個 #guestModeBlock 區塊) ===== -->
    <div id="guestModeBlock" class="mt-6 pt-6 border-t border-dashed border-gray-800">
      <div class="text-center">
        <div class="text-[11px] text-gray-600 tracking-widest mb-3">DEMO 預覽用</div>
        <button id="guestBtn" class="w-full px-4 py-3 rounded-lg bg-gray-800/40 border border-gray-700 text-sm text-gray-300 hover:bg-gray-800/60 hover:text-orange-200 hover:border-orange-500/30 transition-colors">
          訪客模式進入 →
          <span class="block text-[10px] text-gray-500 mt-1">不需登入即可預覽 · 進度不會儲存</span>
        </button>
      </div>
    </div>
    <!-- ===== /GUEST MODE ===== -->

    <div class="mt-8 pt-6 border-t border-gray-800/60 text-center">
      <p class="text-xs text-gray-600 leading-relaxed">
        無法登入？請洽各區人資暨法務部 HR 將您的 Email 加入白名單。<br>
        © 2026 展晟照明集團 · 內部訓練系統
      </p>
    </div>
  </div>

</div>

<script type="module">
  import { onAuth, signInWithGoogle, SUPER_ADMIN_EMAIL } from './firebase-app.js';

  // 進到 login 頁就清除 guest 狀態（避免卡住）
  sessionStorage.removeItem('glow-guest-mode');

  const btn = document.getElementById('signInBtn');
  const errEl = document.getElementById('loginError');
  const infoEl = document.getElementById('loginInfo');

  // URL 參數判讀（從 auth-guard 跳過來會帶 ?notallowed=1 / ?denied=manager）
  const params = new URLSearchParams(location.search);
  if (params.get('notallowed') === '1') {
    infoEl.textContent = '你的 Email 尚未在授權白名單中，請洽主管或 HR 申請開通。';
    infoEl.classList.remove('hidden');
  } else if (params.get('denied') === 'manager') {
    infoEl.textContent = '主管後台僅限主管角色存取，已將你導回主畫面。';
    infoEl.classList.remove('hidden');
  } else if (params.get('signedout') === '1') {
    infoEl.textContent = '你已登出。';
    infoEl.classList.remove('hidden');
  }

  // 自動偵測：如果已登入就直接跳走
  onAuth((user, info) => {
    if (user) {
      // 主管 → 一般人都先回首頁
      location.href = 'index.html';
    } else if (info && info.reason === 'EMAIL_NOT_IN_ALLOWLIST') {
      errEl.textContent = '此 Email 不在授權白名單，登入已被拒絕。';
      errEl.classList.remove('hidden');
      btn.disabled = false;
    }
  });

  btn.addEventListener('click', async () => {
    btn.disabled = true;
    errEl.classList.add('hidden');
    try {
      await signInWithGoogle();
      // onAuth 監聽器會處理跳轉
    } catch (e) {
      console.error(e);
      let msg = '登入失敗：' + (e.message || e.code || '未知錯誤');
      if (e.code === 'auth/popup-closed-by-user') msg = '你關掉了登入視窗。';
      if (e.code === 'auth/popup-blocked') msg = '瀏覽器擋掉登入彈窗，請允許彈窗後再試。';
      if (e.code === 'auth/unauthorized-domain') msg = '此網域尚未在 Firebase Authorized domains 加入，請主管確認設定。';
      errEl.textContent = msg;
      errEl.classList.remove('hidden');
      btn.disabled = false;
    }
  });

  // ===== GUEST MODE (DEMO ONLY) =====
  const guestBtn = document.getElementById('guestBtn');
  if (guestBtn) {
    guestBtn.addEventListener('click', () => {
      sessionStorage.setItem('glow-guest-mode', '1');
      location.href = 'index.html';
    });
  }

  // 從其他 HTML 已嵌入的 base64 取得 — 這裡 fallback 到簡單的 dot logo
